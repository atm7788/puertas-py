<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0d14;color:#e2e8f0;overflow-x:hidden;padding-bottom:64px}
:root{--green:#10b981;--amber:#f59e0b;--red:#dc2626;--blue:#3b82f6;--purple:#8b5cf6;--pink:#ec4899;--bg2:#141821;--bg3:#1a1f2e;--border:#1e293b;--muted:#64748b;--text:#cbd5e1}

.tabs{position:fixed;bottom:0;left:0;right:0;display:flex;background:#0a0d14;border-top:2px solid var(--border);z-index:100;padding:4px 0 env(safe-area-inset-bottom,4px)}
.tab{flex:1;padding:8px 2px 6px;text-align:center;font-size:9px;font-weight:700;letter-spacing:.3px;color:var(--muted);border:none;background:none;cursor:pointer;transition:.2s}
.tab.on{color:var(--amber)}
.tab .ico{font-size:18px;display:block;margin-bottom:2px}
.page{display:none;padding:16px}
.page.on{display:block}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
.card-title{font-size:11px;color:var(--muted);letter-spacing:1px;margin-bottom:10px;font-weight:700}

.pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.pill{padding:8px 12px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:12px;font-weight:600;cursor:pointer;transition:.2s;min-width:44px;text-align:center}
.pill.on{background:var(--amber);color:#0a0d14;border-color:var(--amber)}

.metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.metric{background:var(--bg3);border-radius:8px;padding:10px}
.metric .lbl{font-size:9px;color:var(--muted);letter-spacing:.5px;font-weight:700}
.metric .val{font-size:20px;font-weight:700;margin-top:2px}
.metric .sub{font-size:9px;color:var(--muted);margin-top:2px}

.row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.row label{font-size:12px;color:var(--text);min-width:60px}
.num-input{width:80px;padding:8px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:#fff;font-size:16px;text-align:center;font-weight:700}

.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl th{text-align:left;padding:6px 8px;color:var(--muted);border-bottom:1px solid var(--border);font-size:9px;letter-spacing:.5px}
.tbl td{padding:6px 8px;border-bottom:1px solid #111}
.tbl .r{text-align:right;color:var(--green);font-weight:700}

.step{background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden}
.step-head{padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer}
.step-num{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;flex-shrink:0}
.step-info{flex:1}
.step-title{font-size:13px;font-weight:700;letter-spacing:.5px}
.step-machine{font-size:10px;color:var(--muted)}
.step-time{font-size:10px;color:var(--muted);background:var(--bg3);padding:4px 8px;border-radius:4px;white-space:nowrap}
.step-body{padding:0 14px 14px;display:none}
.step.open .step-body{display:block}
.step.open{border-color:var(--amber)}
.step-detail{display:flex;gap:8px;align-items:flex-start;margin-bottom:6px}
.step-detail .n{width:18px;height:18px;border-radius:4px;background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.3);display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--amber);font-weight:700;flex-shrink:0}
.step-detail .t{font-size:12px;color:var(--text);line-height:1.5}

.plan-wrap{overflow:auto;-webkit-overflow-scrolling:touch;background:var(--bg2);border-radius:10px;border:1px solid var(--border);padding:8px}
.plan-wrap svg{display:block;min-width:500px}

.lean-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.lean-card{background:var(--bg3);border-radius:8px;padding:10px;border-left:3px solid var(--amber)}
.lean-card .lbl{font-size:9px;color:var(--muted);font-weight:700;letter-spacing:.5px}
.lean-card .val{font-size:13px;font-weight:700;color:var(--text);margin-top:2px}

.timeline{display:flex;height:28px;border-radius:6px;overflow:hidden;margin:8px 0}
.timeline div{display:flex;align-items:center;justify-content:center;font-size:7px;color:#fff;font-weight:700}

.cat-head{padding:10px 14px;background:var(--bg3);border-bottom:1px solid var(--border);font-size:10px;color:var(--muted);letter-spacing:1px;font-weight:700}
.price-row{display:flex;align-items:center;gap:6px;padding:8px 10px;border-bottom:1px solid #111}
.price-row.custom{background:rgba(16,185,129,.06)}
.price-name{flex:1;min-width:0}
.price-name .ru{font-size:11px;color:var(--text)}
.price-name .es{font-size:9px;color:var(--muted)}
.price-ref{font-size:9px;color:var(--muted);text-align:right;min-width:55px}
.price-inp{width:75px;padding:6px 4px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--green);font-size:13px;text-align:center;font-weight:700;font-family:inherit}
.price-inp::placeholder{color:#475569;font-weight:400;font-size:11px}
.price-delta{font-size:9px;font-weight:700;min-width:35px;text-align:right}
.store-item{padding:10px 14px;border-bottom:1px solid #111;display:flex;gap:10px;align-items:center}
.store-item .info{flex:1}
.store-item .sname{font-size:13px;font-weight:700;color:var(--text)}
.store-item .sdetail{font-size:10px;color:var(--muted);margin-top:2px}
.store-item .snotes{font-size:10px;color:var(--text);margin-top:2px;font-style:italic}
.store-del{width:28px;height:28px;border-radius:6px;border:1px solid rgba(220,38,38,.3);background:none;color:#dc2626;font-size:14px;cursor:pointer}
.sf-row{margin-bottom:6px}
.sf-row label{display:block;font-size:9px;color:var(--muted);letter-spacing:.5px;margin-bottom:3px;font-weight:700}
.sf-row input,.sf-row select{width:100%;padding:8px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:13px;font-family:inherit}
.btn-add{width:100%;padding:10px;border-radius:6px;border:none;background:var(--green);color:#0a0d14;font-weight:700;font-size:12px;cursor:pointer;letter-spacing:.5px;margin-top:6px;font-family:inherit}
.btn-reset{padding:6px 12px;border-radius:6px;border:1px solid rgba(220,38,38,.3);background:rgba(220,38,38,.1);color:#fca5a5;font-size:10px;cursor:pointer;font-family:inherit}
.badge{display:inline-block;background:var(--green);color:#0a0d14;font-size:8px;font-weight:700;padding:1px 4px;border-radius:8px;margin-left:2px;vertical-align:top}

.faq-section{background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden}
.faq-section.open{border-color:var(--amber)}
.faq-head{padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.faq-head .fnum{width:28px;height:28px;border-radius:8px;background:var(--amber);color:#0a0d14;font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.faq-head .ftitle{flex:1;font-size:12px;font-weight:700;letter-spacing:.5px}
.faq-head .farrow{font-size:10px;color:var(--muted);transition:.2s}
.faq-section.open .farrow{transform:rotate(90deg)}
.faq-body{display:none;padding:0 14px 14px}
.faq-section.open .faq-body{display:block}
.faq-item{padding:8px 0;border-bottom:1px solid #111}
.faq-item:last-child{border:none}
.faq-mat{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.faq-mat .fm-name{font-size:12px;color:var(--text);font-weight:600}
.faq-mat .fm-es{font-size:10px;color:var(--amber);margin-top:2px}
.faq-mat .fm-note{font-size:10px;color:var(--muted);margin-top:2px}
.faq-mat .fm-price{font-size:11px;color:var(--green);font-weight:700;white-space:nowrap;text-align:right}
.faq-q{padding:10px 0;border-bottom:1px solid #111}
.faq-q:last-child{border:none}
.faq-q .es-text{font-size:13px;color:var(--amber);font-weight:600;line-height:1.4;margin-bottom:4px}
.faq-q .ru-text{font-size:10px;color:var(--muted);line-height:1.4}
.faq-ask{display:flex;gap:8px;align-items:flex-start;margin-bottom:8px}
.faq-ask .qdot{width:20px;height:20px;border-radius:6px;background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.3);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--amber);font-weight:700;flex-shrink:0}
.faq-ask .qtxt{font-size:11px;color:var(--text);line-height:1.5}
.faq-calc{background:var(--bg3);border-radius:8px;padding:10px 12px;margin-top:6px}
.faq-calc .fc-row{display:flex;justify-content:space-between;font-size:11px;color:var(--text);margin-bottom:4px}
.faq-calc .fc-row:last-child{margin:0}
.faq-calc .fc-row .fc-v{color:var(--green);font-weight:700}
</style>
</head>

let st={doorIdx:0,finIdx:1,hwIdx:0,qty:10,rate:RATE};

function gs(usd){return Math.round(usd*st.rate)}
function fGs(n){return Math.round(n).toLocaleString('es-PY')}
function fUsd(n){return n.toFixed(2)}
function getDiscount(qty){return(DISCOUNTS.find(d=>qty>=d.min&&qty<=d.max)||DISCOUNTS[0]).pct}
function gp(key,def){return customPrices[key]!==undefined?customPrices[key]/st.rate:def}

function calcDoor(){
  const d=DOORS[st.doorIdx],f=FINISHES[st.finIdx],hw=HARDWARE[st.hwIdx];
  let mat=0;
  d.bom.forEach(m=>{mat+=m.qty*gp(m.key,m.def)});
  const pp=gp('primer',PRIMER_DEF),cp=gp(f.coatKey,f.coatDef);
  mat+=f.primerL*pp+f.coatL*cp;
  mat+=gp(hw.hingeKey,hw.hinge)*d.hinges+gp(hw.lockKey,hw.lock);
  const carpHr=LABOR.carpDay/LABOR.hours,helpHr=LABOR.helpDay/LABOR.hours;
  const laborGs=(d.carpMin/60)*carpHr+(d.helpMin/60)*helpHr;
  const laborUsd=laborGs/st.rate;
  const cost=mat+laborUsd+OVERHEAD;
  return{mat,laborGs,laborUsd,cost,sell:d.sell,margin:Math.round(((d.sell-cost)/d.sell)*100)};
}

    if(!cs.length)return;
    h+=`<div class="card" style="padding:0;overflow:hidden;margin-bottom:12px">`;
    h+=`<div class="cat-head">${cat.icon} ${cat.name.toUpperCase()} — ${cat.es} (${cs.length})</div>`;
    cs.forEach(s=>{
      h+=`<div class="store-item"><div class="info"><div class="sname">${s.name}</div>`;
      if(s.phone||s.address) h+=`<div class="sdetail">${s.phone?'tel: '+s.phone+' ':''}${s.address||''}</div>`;
      if(s.notes) h+=`<div class="snotes">${s.notes}</div>`;
      h+=`</div><button class="store-del" onclick="deleteStore(${s.id})">✕</button></div>`;
    });
    h+=`</div>`;
  });

  if(!stores.length) h+=`<div class="card" style="text-align:center;color:var(--muted);font-size:12px;padding:24px 14px">Пока нет магазинов.<br>Добавьте после визита.</div>`;

  document.getElementById('prices').innerHTML=h;
}
